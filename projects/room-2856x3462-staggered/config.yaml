room:
  type: rectangle
  width: 2856
  length: 3462

board:
  length: 700
  width: 150
  thickness: 18

installation:
  pattern: staggered
  direction: 90
  stagger_ratio: 0.5

edges:
  baseboard_width: 15
  expansion_gap: 10
  board_gap: 0.5

kerf: 1.0

output:
  file: floor_plan.svg
  scale: auto
  show_dimensions: true
  show_labels: true
  show_grid: false
  color_scheme: wood

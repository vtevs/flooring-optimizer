# 当前示例：多房间三L拼，支持 L 形 polygon 房间和柜子/衣柜障碍物。
# 坐标单位为 mm；以左下角为 (0, 0)，X 向右，Y 向上。

rooms:
  - name: A-主卧
    type: polygon
    width: 3254
    length: 5447
    points:
      - [0, 0]
      - [3254, 0]
      - [3254, 3460]
      - [1063, 3460]
      - [1063, 5447]
      - [0, 5447]
    obstacles: []

  - name: B-儿童房
    type: rectangle
    width: 2562
    length: 3264
    obstacles: []

  - name: C-次卧
    type: rectangle
    width: 2856
    length: 3462
    obstacles:
      - name: wardrobe
        type: rectangle
        x: 0
        y: 2862
        width: 1830
        length: 600

board:
  length: 600
  width: 88
  thickness: 18
  tongue_groove:
    left_long_edge: groove
    right_long_edge: tongue
    bottom_short_edge: groove
    top_short_edge: tongue

installation:
  pattern: l-triple
  direction: 0
  stagger_ratio: 0.5
  expansion_gap: 10
  board_gap: 0.5
  cutting_loss: 3
  allow_rotation: true
  allow_piece_reuse: true
  min_piece_length: 80
  min_piece_width: 20

output:
  svg_path: floor_plan.svg
  cutting_plan_path: cutting_plan.txt

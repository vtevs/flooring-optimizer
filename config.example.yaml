# ============================================================
# 木地板铺装图生成工具 — 配置文件
# ============================================================
# 所有尺寸单位为毫米 (mm)

# ----------------------------------------------------------
# 房间定义
# ----------------------------------------------------------
room:
  # 房间类型: "rectangle" | "l-shaped"
  type: l-shaped

  # --- L 形房间 (type: l-shaped) ---
  # L 形房间 = 一个包围矩形减去一个角落缺口
  # width/length = 包围矩形的总宽和总长
  width: 6000
  length: 8000
  notch:
    width: 3000      # 缺口的宽度
    depth: 3000      # 缺口的深度
    # 缺口位于哪个角: "top-left" | "top-right" | "bottom-left" | "bottom-right"
    position: top-left

  # --- 矩形房间 (type: rectangle) ---
  # 只需提供 width 和 length，不需要 notch
  # type: rectangle
  # width: 5000
  # length: 6000

# ----------------------------------------------------------
# 地板规格
# ----------------------------------------------------------
board:
  length: 1210       # 板长 (顺着纹理的方向)
  width: 198         # 板宽
  # 厚度仅用于记录，不影响铺装计算
  thickness: 12

# ----------------------------------------------------------
# 铺装配置
# ----------------------------------------------------------
installation:
  # 铺装方式: "aligned" | "staggered" | "herringbone" | "five-board-square"
  pattern: staggered

  # 铺装方向: 板的长边朝向
  #   0   = 板长边平行于房间长边 (length 方向)
  #   90  = 板长边平行于房间宽边 (width 方向)
  #   45  = 板长边与墙面成 45° (仅对人字拼有意义，人字拼始终为 45°)
  direction: 0

  # --- 错缝参数 (仅 pattern: staggered 时生效) ---
  stagger_ratio: 0.33   # 错缝比例: 0.33 = 1/3错缝, 0.5 = 对半错

  # --- 起始偏移 (可选) ---
  # 不指定时自动优化；指定后锁定起始偏移量 [x_offset, y_offset]
  # start_offset: [0, 0]

# ----------------------------------------------------------
# 收边参数
# ----------------------------------------------------------
edges:
  baseboard_width: 15    # 踢脚线宽度 (遮挡地板边缘)
  expansion_gap: 10      # 四周伸缩缝，地暖房推荐 10-12mm
  board_gap: 0           # 板间微缝，通常 0-1mm，默认 0

# ----------------------------------------------------------
# 切割损耗（锯缝宽度）
# ----------------------------------------------------------
kerf: 1.0               # 每次切割损耗 mm，默认 1mm

# ----------------------------------------------------------
# 输出配置
# ----------------------------------------------------------
output:
  file: floor_plan.svg
  # 图纸比例: 数字表示 1:N，设为 "auto" 自动适配
  scale: auto
  # SVG 内显示的内容
  show_dimensions: true   # 房间尺寸标注
  show_labels: true       # 地板编号
  show_grid: false        # 辅助网格
  # 颜色方案: "wood" | "bw" (黑白打印)
  color_scheme: wood
